<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .step { font: 800 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; }
      .num { fill: #111827; }
      .line { stroke: #64748b; stroke-width: 2.2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="56" y="58" class="title">Order Event Flow</text>
  <text x="56" y="88" class="small">동기 API 요청은 짧게 끝내고, 이후 재고와 결제는 이벤트로 이어갑니다.</text>

  <path d="M216 190 L338 190" class="line"/>
  <path d="M516 190 L638 190" class="line"/>
  <path d="M816 190 L938 190" class="line"/>
  <path d="M1030 248 C1030 330 174 330 174 408" class="line"/>
  <path d="M216 408 L338 408" class="line"/>
  <path d="M516 408 L638 408" class="line"/>
  <path d="M816 408 L938 408" class="line"/>

  <rect x="56" y="132" width="160" height="116" class="card"/>
  <circle cx="86" cy="162" r="18" class="num"/>
  <text x="81" y="168" fill="#fff" font-size="16" font-weight="800">1</text>
  <text x="112" y="164" class="step">주문 요청</text>
  <text x="76" y="199" class="body">POST /api/orders</text>
  <text x="76" y="222" class="small">idempotency key</text>

  <rect x="338" y="132" width="178" height="116" class="card"/>
  <circle cx="368" cy="162" r="18" class="num"/>
  <text x="363" y="168" fill="#fff" font-size="16" font-weight="800">2</text>
  <text x="394" y="164" class="step">주문 저장</text>
  <text x="358" y="199" class="body">Order insert</text>
  <text x="358" y="222" class="small">Outbox insert</text>

  <rect x="638" y="132" width="178" height="116" class="card"/>
  <circle cx="668" cy="162" r="18" class="num"/>
  <text x="663" y="168" fill="#fff" font-size="16" font-weight="800">3</text>
  <text x="694" y="164" class="step">이벤트 발행</text>
  <text x="658" y="199" class="body">Outbox publisher</text>
  <text x="658" y="222" class="small">Kafka publish</text>

  <rect x="938" y="132" width="178" height="116" class="card"/>
  <circle cx="968" cy="162" r="18" class="num"/>
  <text x="963" y="168" fill="#fff" font-size="16" font-weight="800">4</text>
  <text x="994" y="164" class="step">재고 예약</text>
  <text x="958" y="199" class="body">Inventory consume</text>
  <text x="958" y="222" class="small">reserved / failed</text>

  <rect x="56" y="350" width="160" height="116" class="card"/>
  <circle cx="86" cy="380" r="18" class="num"/>
  <text x="81" y="386" fill="#fff" font-size="16" font-weight="800">5</text>
  <text x="112" y="382" class="step">결제 요청</text>
  <text x="76" y="417" class="body">Payment consume</text>
  <text x="76" y="440" class="small">approve / fail</text>

  <rect x="338" y="350" width="178" height="116" class="card"/>
  <circle cx="368" cy="380" r="18" class="num"/>
  <text x="363" y="386" fill="#fff" font-size="16" font-weight="800">6</text>
  <text x="394" y="382" class="step">상태 반영</text>
  <text x="358" y="417" class="body">Order saga update</text>
  <text x="358" y="440" class="small">confirmed / cancelled</text>

  <rect x="638" y="350" width="178" height="116" class="card"/>
  <circle cx="668" cy="380" r="18" class="num"/>
  <text x="663" y="386" fill="#fff" font-size="16" font-weight="800">7</text>
  <text x="694" y="382" class="step">재고 확정</text>
  <text x="658" y="417" class="body">Confirm / release</text>
  <text x="658" y="440" class="small">compensation</text>

  <rect x="938" y="350" width="178" height="116" class="card"/>
  <circle cx="968" cy="380" r="18" class="num"/>
  <text x="963" y="386" fill="#fff" font-size="16" font-weight="800">8</text>
  <text x="994" y="382" class="step">캐시 갱신</text>
  <text x="958" y="417" class="body">Product consume</text>
  <text x="958" y="440" class="small">Redis stock update</text>
</svg>
