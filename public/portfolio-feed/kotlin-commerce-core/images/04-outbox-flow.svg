<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .head { font: 800 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; }
      .dark { fill: #111827; }
      .soft { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; }
      .line { stroke: #64748b; stroke-width: 2.2; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="56" y="58" class="title">Transactional Outbox</text>
  <text x="56" y="88" class="small">비즈니스 저장과 메시지 발행 요청을 같은 DB 트랜잭션에 남긴 뒤, 별도 퍼블리셔가 안전하게 Kafka로 발행합니다.</text>

  <rect x="70" y="150" width="210" height="112" class="card"/>
  <text x="96" y="187" class="head">1. Business TX</text>
  <text x="96" y="218" class="body">Order 저장</text>
  <text x="96" y="241" class="body">Outbox PENDING 저장</text>

  <rect x="372" y="150" width="210" height="112" class="soft"/>
  <text x="398" y="187" class="head">2. Claim</text>
  <text x="398" y="218" class="body">SKIP LOCKED</text>
  <text x="398" y="241" class="body">lease_owner 설정</text>

  <rect x="674" y="150" width="210" height="112" class="card"/>
  <text x="700" y="187" class="head">3. Publish</text>
  <text x="700" y="218" class="body">DB TX 밖에서</text>
  <text x="700" y="241" class="body">Kafka event 발행</text>

  <rect x="976" y="150" width="154" height="112" class="dark" rx="14"/>
  <text x="1011" y="187" fill="#fff" font-size="18" font-weight="800">Kafka</text>
  <text x="1006" y="218" fill="#cbd5e1" font-size="14">event broker</text>

  <path d="M280 206 L372 206" class="line"/>
  <path d="M582 206 L674 206" class="line"/>
  <path d="M884 206 L976 206" class="line"/>

  <rect x="372" y="338" width="210" height="112" class="card"/>
  <text x="398" y="375" class="head">4A. Success</text>
  <text x="398" y="406" class="body">status = SENT</text>
  <text x="398" y="429" class="body">lease 해제</text>

  <rect x="674" y="338" width="210" height="112" class="card"/>
  <text x="700" y="375" class="head">4B. Failure</text>
  <text x="700" y="406" class="body">attempts 증가</text>
  <text x="700" y="429" class="body">backoff 후 재시도</text>

  <path d="M779 262 C764 304 572 304 506 338" class="dash"/>
  <path d="M779 262 C805 306 789 311 779 338" class="dash"/>

  <rect x="70" y="338" width="210" height="112" fill="#fff" stroke="#e2e8f0" rx="14"/>
  <text x="96" y="375" class="head">Why</text>
  <text x="96" y="406" class="body">DB 성공 / Kafka 실패를</text>
  <text x="96" y="429" class="body">복구 가능한 상태로 보존</text>

  <path d="M477 338 C470 306 477 294 477 262" class="dash"/>
  <text x="500" y="307" class="small">lease 만료 시 다른 인스턴스가 재처리</text>
</svg>
