name: Deploy Portfolio Hub to AWS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "config/portfolio-feed-projects.json"
      - "docs/**"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "tsconfig.json"
      - "vite.config.ts"
      - ".github/workflows/deploy-aws.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build feed index
        run: pnpm feed:index
        env:
          PORTFOLIO_FEED_BASE_URL: ${{ secrets.PORTFOLIO_FEED_BASE_URL }}

      - name: Build hub
        run: pnpm build
        env:
          VITE_PORTFOLIO_FEED_URL: ${{ secrets.VITE_PORTFOLIO_FEED_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload feed index
        run: |
          aws s3 cp public/portfolio-feed/index.json \
            "s3://${{ secrets.PORTFOLIO_FEED_BUCKET }}/portfolio-feed/index.json" \
            --content-type "application/json" \
            --cache-control "no-cache"

      - name: Deploy static site
        run: |
          aws s3 sync dist "s3://${{ secrets.AWS_S3_BUCKET }}/" \
            --delete \
            --cache-control "public,max-age=300"

      - name: Invalidate CloudFront
        if: ${{ env.AWS_CLOUDFRONT_DISTRIBUTION_ID != '' }}
        env:
          AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${AWS_CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
