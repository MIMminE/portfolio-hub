name: Deploy Portfolio Hub to AWS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "config/portfolio-feed-projects.json"
      - "docs/**"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "tsconfig.json"
      - "vite.config.ts"
      - ".github/workflows/deploy-aws.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID_VALUE: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY_VALUE: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION_VALUE: ${{ secrets.AWS_REGION }}
      AWS_S3_BUCKET_VALUE: ${{ secrets.AWS_S3_BUCKET }}
      PORTFOLIO_FEED_BUCKET_VALUE: ${{ secrets.PORTFOLIO_FEED_BUCKET }}
      AWS_CLOUDFRONT_DISTRIBUTION_ID_VALUE: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build feed index
        run: pnpm feed:index
        env:
          PORTFOLIO_FEED_BASE_URL: ${{ secrets.PORTFOLIO_FEED_BASE_URL }}

      - name: Build hub
        run: pnpm build
        env:
          VITE_PORTFOLIO_FEED_URL: ${{ secrets.VITE_PORTFOLIO_FEED_URL }}

      - name: Configure AWS credentials
        if: ${{ env.AWS_ACCESS_KEY_ID_VALUE != '' && env.AWS_SECRET_ACCESS_KEY_VALUE != '' && env.AWS_REGION_VALUE != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID_VALUE }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY_VALUE }}
          aws-region: ${{ env.AWS_REGION_VALUE }}

      - name: Explain skipped AWS deploy
        if: ${{ env.AWS_ACCESS_KEY_ID_VALUE == '' || env.AWS_SECRET_ACCESS_KEY_VALUE == '' || env.AWS_REGION_VALUE == '' || env.AWS_S3_BUCKET_VALUE == '' || env.PORTFOLIO_FEED_BUCKET_VALUE == '' }}
        run: |
          echo "AWS deploy secrets are not fully configured."
          echo "Build validation completed, but S3 upload and CloudFront invalidation were skipped."

      - name: Upload feed index
        if: ${{ env.AWS_ACCESS_KEY_ID_VALUE != '' && env.AWS_SECRET_ACCESS_KEY_VALUE != '' && env.AWS_REGION_VALUE != '' && env.PORTFOLIO_FEED_BUCKET_VALUE != '' }}
        run: |
          aws s3 cp public/portfolio-feed/index.json \
            "s3://${PORTFOLIO_FEED_BUCKET_VALUE}/portfolio-feed/index.json" \
            --content-type "application/json" \
            --cache-control "no-cache"

      - name: Deploy static site
        if: ${{ env.AWS_ACCESS_KEY_ID_VALUE != '' && env.AWS_SECRET_ACCESS_KEY_VALUE != '' && env.AWS_REGION_VALUE != '' && env.AWS_S3_BUCKET_VALUE != '' }}
        run: |
          aws s3 sync dist "s3://${AWS_S3_BUCKET_VALUE}/" \
            --delete \
            --cache-control "public,max-age=300"

      - name: Invalidate CloudFront
        if: ${{ env.AWS_ACCESS_KEY_ID_VALUE != '' && env.AWS_SECRET_ACCESS_KEY_VALUE != '' && env.AWS_REGION_VALUE != '' && env.AWS_CLOUDFRONT_DISTRIBUTION_ID_VALUE != '' }}
        env:
          AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ env.AWS_CLOUDFRONT_DISTRIBUTION_ID_VALUE }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${AWS_CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
