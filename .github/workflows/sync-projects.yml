name: Sync Project Status

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync GitHub project status
        run: pnpm sync:all
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PORTFOLIO_RELEASE_BASE_URL: ${{ secrets.PORTFOLIO_RELEASE_BASE_URL }}

      - name: Commit generated status
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(sync): 프로젝트 상태 자동 갱신"
          file_pattern: src/data/generated-status.json
